name: Generate Weekly Newsletters

# This tells GitHub to give you a manual "Run" button
on:
  workflow_dispatch:

jobs:
  build_emails:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install required libraries
        run: pip install -r requirements.txt

      - name: Run the Python script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python 01_generate_newsletter.py

      - name: Upload the finished newsletters
        uses: actions/upload-artifact@v4
        with:
          name: finished-newsletters
          path: output/
